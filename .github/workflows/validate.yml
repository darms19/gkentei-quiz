name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 内蔵問題・用語集データの整合性チェック(件数・ID重複・構造・選択肢など)
      - run: npm run validate
      # ビルドが通ることも確認する
      - run: npm run build
